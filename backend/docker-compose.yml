services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb_backend
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${TIMESCALEDB_USER:-postgres}
      POSTGRES_PASSWORD: ${TIMESCALEDB_PASSWORD:-postgres}
      POSTGRES_DB: ${TIMESCALEDB_DB:-timescaledb}
    ports:
      - "${TIMESCALEDB_PORT:-5432}:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${TIMESCALEDB_USER:-postgres} -d ${TIMESCALEDB_DB:-timescaledb}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  timescaledb_data:
